services:
  # 1. Caddy (Web 服务器/反向代理)
  caddy:
    build: ./caddy
    container_name: nextcloud-caddy
    restart: always
    env_file: .env
    ports:
      # 动态读取并映射 .env 中的端口
      - "${HTTPS_PORT}:${HTTPS_PORT}"
    networks:
      - nextcloud-network
    volumes:
      - ./data/caddy/data:/data
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - nextcloud-app
      - collabora
      
  # 2. Nextcloud (核心应用 FPM)
  nextcloud-app:
    image: nextcloud:fpm-alpine
    container_name: nextcloud-app
    restart: always
    env_file: .env
    networks:
      - nextcloud-network
    volumes:
      - ./data/nextcloud/html:/var/www/html
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_TRUSTED_PROXIES=caddy
      # --- 关键修复：防止非标准端口导致重定向失败 ---
      - OVERWRITEHOST=${YOUR_DOMAIN}:${HTTPS_PORT}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${YOUR_DOMAIN}:${HTTPS_PORT}
      # ----------------------------------------------
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ANTIVIRUS_HOST=clamav
      - ANTIVIRUS_PORT=3310
    depends_on:
      - db
      - redis
      - elasticsearch
      - clamav

  # 3. Collabora (在线 Office)
  collabora:
    image: collabora/code:latest
    container_name: nextcloud-collabora
    restart: always
    networks:
      - nextcloud-network
    environment:
      - domain=nextcloud-app
      - DONT_GEN_SSL_CERT="true"
    cap_add:
      - MKNOD

  # 4. Elasticsearch (全文搜索后端)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.3
    container_name: nextcloud-elasticsearch
    restart: always
    networks:
      - nextcloud-network
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  # 5. Imaginary (高性能图片预览)
  imaginary:
    image: nextcloud/aio-imaginary:latest
    container_name: nextcloud-imaginary
    restart: always
    networks:
      - nextcloud-network
    environment:
      - "PORT=9000"
      - "ADDRESS=0.0.0.0"

  # 6. ClamAV (防病毒扫描)
  clamav:
    image: clamav/clamav:latest
    container_name: nextcloud-clamav
    restart: always
    networks:
      - nextcloud-network
    volumes:
      - ./data/clamav:/var/lib/clamav
      
  # 7. Cron (后台定时任务)
  cron:
    image: nextcloud:fpm-alpine
    container_name: nextcloud-cron
    restart: always
    networks:
      - nextcloud-network
    volumes:
      - ./data/nextcloud/html:/var/www/html
    entrypoint: /bin/sh -c 'while true; do su -s /bin/sh www-data -c "php /var/www/html/cron.php"; sleep 900; done'
    depends_on:
      - nextcloud-app

  # 8. PostgreSQL (数据库)
  db:
    image: postgres:alpine
    container_name: nextcloud-db
    restart: always
    env_file: .env
    networks:
      - nextcloud-network
    volumes:
      - ./data/db:/var/lib/postgresql/data

  # 9. Redis (内存缓存)
  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: always
    networks:
      - nextcloud-network

networks:
  nextcloud-network:
    driver: bridge